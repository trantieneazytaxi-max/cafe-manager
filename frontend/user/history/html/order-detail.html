<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết đơn hàng - Cà Phê Thông Minh</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../../../shared/css/global.css">
    <link rel="stylesheet" href="../css/history.css">
    <style>
        .detail-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .detail-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f5f5f5;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }
        .detail-header h1 {
            font-size: 1.5rem;
            color: #5C3A21;
        }
        .status-badge {
            padding: 6px 15px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .status-pending { background: #FEF3C7; color: #92400E; }
        .status-paid { background: #D1FAE5; color: #065F46; }
        .status-completed { background: #DBEAFE; color: #1E40AF; }
        .status-cancelled { background: #FEE2E2; color: #991B1B; }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .info-item label {
            display: block;
            font-size: 0.85rem;
            color: #8B7355;
            margin-bottom: 5px;
        }
        .info-item p {
            font-weight: 600;
            color: #5C3A21;
        }

        .items-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }
        .items-table th {
            text-align: left;
            padding: 12px 0;
            border-bottom: 2px solid #f5f5f5;
            color: #8B7355;
            font-weight: 500;
        }
        .items-table td {
            padding: 15px 0;
            border-bottom: 1px solid #f5f5f5;
        }
        .item-name {
            font-weight: 500;
            color: #5C3A21;
        }
        .item-options {
            font-size: 0.8rem;
            color: #8B7355;
            display: block;
        }

        .summary-section {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            width: 250px;
        }
        .summary-row.total {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 2px solid #f5f5f5;
            font-size: 1.2rem;
            font-weight: 700;
            color: #E67E22;
        }

        .actions {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #8B7355;
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 20px;
        }
        .btn-download {
            background: #E67E22;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-download:hover { background: #D35400; }
    </style>
</head>
<body>
    <!-- Navbar will be injected here -->
    <div id="navbar-placeholder"></div>

    <main class="detail-container">
        <a href="history.html" class="btn-back">
            <i class="fas fa-arrow-left"></i> Quay lại lịch sử
        </a>

        <div class="detail-card" id="orderDetailContent">
            <div class="loading-spinner" style="text-align: center; padding: 50px;">
                <i class="fas fa-spinner fa-spin fa-2x"></i>
                <p>Đang tải chi tiết đơn hàng...</p>
            </div>
        </div>

        <div class="actions" id="detailActions" style="display: none;">
            <a href="#" id="downloadInvoice" class="btn-download">
                <i class="fas fa-download"></i> Tải biên lai (PDF)
            </a>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="../../../shared/js/navbar.js"></script>
    <script src="../../../shared/js/global.js"></script>
    <script src="../js/order-detail.js"></script>
</body>
</html>
