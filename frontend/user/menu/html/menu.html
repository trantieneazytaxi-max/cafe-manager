<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Thực đơn - Cà Phê Thông Minh</title>
    <link rel="stylesheet" href="../../../shared/css/global.css">
    <link rel="stylesheet" href="../css/menu.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-mug-hot"></i>
                <span>Cà Phê <span class="highlight">Thông Minh</span></span>
            </div>
            <div class="nav-links" id="navLinks">
                <a href="../../index/html/index.html"><i class="fas fa-home"></i> Trang chủ</a>
                <a href="../../menu/html/menu.html" class="active"><i class="fas fa-coffee"></i> Thực đơn</a>
                <a href="../../offers/html/offers.html"><i class="fas fa-gift"></i> Ưu đãi</a>
                <a href="../../tables/html/tables.html"><i class="fas fa-chair"></i> Đặt bàn</a>
                <a href="../../orders/html/orders.html"><i class="fas fa-shopping-cart"></i> Giỏ hàng <span id="cartCount" class="cart-badge" style="display: none;">0</span></a>
                <a href="../../history/html/history.html"><i class="fas fa-history"></i> Lịch sử</a>
                
                <!-- Profile Dropdown -->
                <div class="profile-dropdown" id="profileDropdown">
                    <button class="profile-btn" id="profileBtn">
                        <img id="avatarImg" class="avatar-small" src="https://ui-avatars.com/api/?background=E67E22&color=fff&rounded=true" alt="Avatar">
                        <span id="userNameShort"></span>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="dropdown-menu" id="dropdownMenu">
                        <a href="../../profile/html/profile.html"><i class="fas fa-user-circle"></i> Thông tin cá nhân</a>
                        <a href="../../history/html/history.html"><i class="fas fa-history"></i> Lịch sử đơn hàng</a>
                        <a href="../../settings/html/settings.html"><i class="fas fa-cog"></i> Cài đặt</a>
                        <hr>
                        <a href="#" id="logoutDropdownBtn"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a>
                    </div>
                </div>
            </div>
            <div class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <!-- Hero Menu Section -->
    <section class="menu-hero">
        <div class="menu-hero-overlay"></div>
        <div class="menu-hero-content">
            <h1>Thực đơn <span class="highlight">đặc sắc</span></h1>
            <p>Những thức uống và món ăn được pha chế từ những nguyên liệu tốt nhất</p>
            <div class="menu-search">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Tìm kiếm món ăn, đồ uống...">
            </div>
        </div>
    </section>

    <!-- Recommended Section (New feature, old style) -->
    <div class="container" id="recommendedSection" style="display: none; margin-top: 2rem;">
        <h2 style="color: #5C3A21; margin-bottom: 1.5rem; font-size: 1.5rem;"><i class="fas fa-fire" style="color: #E67E22;"></i> Gợi ý hôm nay</h2>
        <div class="menu-grid" id="recommendedGrid" style="margin-bottom: 3rem;"></div>
    </div>

    <!-- Category Tabs -->
    <div class="category-tabs" id="categoryTabs">
        <div class="category-tab active" data-category="all">
            <i class="fas fa-utensils"></i>
            <span>Tất cả</span>
        </div>
    </div>

    <!-- Menu Grid -->
    <section class="menu-section">
        <div class="container">
            <div class="menu-grid" id="menuGrid">
                <div class="loading-spinner">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Đang tải thực đơn...</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Modal chọn tùy chọn (Updated to handle new features) -->
    <div id="optionModal" class="option-modal hidden">
        <div class="option-modal-content">
            <div class="option-modal-header">
                <h3 id="modalItemName">Tên món</h3>
                <button class="modal-close" id="closeModalBtn">&times;</button>
            </div>
            <div class="option-modal-body">
                <div id="modalItemDesc" style="color: #666; font-size: 0.9rem; margin-bottom: 1.5rem;"></div>
                
                <div id="custOptionsBody">
                    <!-- Dynamic Options (Sizes, Toppings, etc) -->
                </div>

                <div class="price-display">
                    <span>Tổng cộng:</span>
                    <span id="displayPrice">0đ</span>
                </div>
            </div>
            <div class="option-modal-footer">
                <button class="btn-cancel" id="cancelBtn">Hủy</button>
                <button class="btn-confirm" id="confirmBtn">Thêm vào giỏ</button>
            </div>
        </div>
    </div>

    <style>
    .option-modal {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1001;
    }
    .option-modal.hidden { display: none; }
    .option-modal-content {
        background: white; border-radius: 24px; width: 90%; max-width: 450px; overflow: hidden; animation: modalFadeIn 0.3s ease;
    }
    .option-modal-header {
        display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.5rem; background: #5C3A21; color: white;
    }
    .option-modal-body { padding: 1.5rem; max-height: 70vh; overflow-y: auto; }
    .cust-group { margin-bottom: 1.5rem; }
    .cust-label { display: block; font-weight: 600; color: #5C3A21; margin-bottom: 0.75rem; }
    .cust-options { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .option-btn {
        padding: 0.6rem 1.2rem; border: 2px solid #F5E6D3; background: #FFF8F0; border-radius: 40px;
        cursor: pointer; transition: all 0.2s ease; font-weight: 500;
    }
    .option-btn.selected { background: #E67E22; color: white; border-color: #E67E22; }
    .price-display { background: #F5E6D3; padding: 1rem; border-radius: 16px; text-align: center; margin-top: 1rem; }
    .price-display span:last-child { font-size: 1.5rem; font-weight: 700; color: #E67E22; margin-left: 0.5rem; }
    .option-modal-footer { display: flex; gap: 1rem; padding: 1rem 1.5rem 1.5rem; }
    .btn-cancel, .btn-confirm { flex: 1; padding: 0.75rem; border-radius: 40px; font-weight: 600; cursor: pointer; }
    .btn-cancel { background: #F5E6D3; border: none; color: #5C3A21; }
    .btn-confirm { background: #E67E22; border: none; color: white; }
    
    /* Sold out style */
    .menu-card.paused { opacity: 0.6; filter: grayscale(0.5); cursor: not-allowed; }
    .paused-badge { position: absolute; top: 10px; right: 10px; background: #e74c3c; color: white; padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; z-index: 2; }
    .hot-badge { position: absolute; top: 10px; left: 10px; background: #E67E22; color: white; padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; z-index: 2; }
    </style>

    <script src="../../../shared/js/api.js"></script>
    <script src="../js/menu.js"></script>
    <script src="../../../shared/js/global.js"></script>
</body>
</html>
