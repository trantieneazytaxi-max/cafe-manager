<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập nội bộ - Cà Phê Thông Minh</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 450px;
            width: 100%;
        }

        .logo {
            font-size: 3rem;
            color: #e94560;
            margin-bottom: 1rem;
        }

        h1 {
            color: #fff;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #8892b0;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 1rem;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-admin {
            background: linear-gradient(135deg, #e94560, #c62a4a);
            color: white;
            border: none;
        }

        .btn-admin:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(233, 69, 96, 0.4);
        }

        .btn-staff {
            background: rgba(0, 243, 255, 0.1);
            color: #00f3ff;
            border: 1px solid rgba(0, 243, 255, 0.3);
        }

        .btn-staff:hover {
            background: rgba(0, 243, 255, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 243, 255, 0.2);
        }

        .footer {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .footer a {
            color: #8892b0;
            text-decoration: none;
            font-size: 0.85rem;
        }

        .footer a:hover {
            color: #e94560;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <i class="fas fa-mug-hot"></i>
        </div>
        <h1>Đăng nhập nội bộ</h1>
        <p class="subtitle">Vui lòng chọn vai trò để tiếp tục</p>

        <div class="btn-group">
            <a href="admin/auth/html/admin-login.html" class="btn btn-admin">
                <i class="fas fa-user-shield"></i> Đăng nhập với vai trò Quản trị viên
            </a>
            <a href="staff/auth/html/staff-login.html" class="btn btn-staff">
                <i class="fas fa-user-tie"></i> Đăng nhập với vai trò Nhân viên
            </a>
        </div>

        <div class="footer">
            <a href="/index.html">← Quay lại trang dành cho khách hàng</a>
        </div>
    </div>
</body>
</html>
