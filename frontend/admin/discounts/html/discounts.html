<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý mã giảm giá | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../dashboard/css/admin-dashboard.css">
    <link rel="stylesheet" href="../css/discounts.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar Placeholder -->
        <div id="sidebar-placeholder"></div>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <h2 style="font-family: 'Orbitron', sans-serif; letter-spacing: 2px; color: #fff; text-shadow: 0 0 10px #00f3ff;">QUẢN LÝ MÃ GIẢM GIÁ</h2>
                <button class="btn-cyber" id="addDiscountBtn">
                    <i class="fas fa-plus"></i> TẠO MÃ MỚI
                </button>
            </div>

            <!-- Discount List -->
            <div class="discount-grid" id="discountGrid">
                <!-- Cards will be loaded by JS -->
                <div class="loading">Đang tải...</div>
            </div>
        </main>
    </div>

    <!-- Create Discount Modal -->
    <div id="discountModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Tạo mã giảm giá mới</h3>
                <button class="close-btn">&times;</button>
            </div>
            <form id="discountForm">
                <input type="hidden" id="code_id" name="code_id">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Mã giảm giá</label>
                        <input type="text" id="code" name="code" placeholder="VD: GIAM20" required>
                    </div>
                    <div class="form-group">
                        <label>Mô tả</label>
                        <input type="text" id="description" name="description" placeholder="VD: Giảm 20k cho đơn từ 100k">
                    </div>
                    <div class="form-group">
                        <label>Loại giảm giá</label>
                        <select id="discount_type" name="discount_type" required>
                            <option value="percentage">Phần trăm (%)</option>
                            <option value="fixed">Số tiền cố định (đ)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Giá trị giảm</label>
                        <input type="number" id="discount_value" name="discount_value" required>
                    </div>
                    <div class="form-group">
                        <label>Đơn tối thiểu</label>
                        <input type="number" id="min_order_amount" name="min_order_amount" value="0">
                    </div>
                    <div class="form-group">
                        <label>Giảm tối đa (cho %)</label>
                        <input type="number" id="max_discount_amount" name="max_discount_amount">
                    </div>
                    <div class="form-group">
                        <label>Giới hạn lượt dùng</label>
                        <input type="number" id="usage_limit" name="usage_limit">
                    </div>
                    <div class="form-group">
                        <label>Ngày hết hạn</label>
                        <input type="date" id="expiry_date" name="expiry_date">
                    </div>
                    <div class="form-group">
                        <label>Phân loại mã</label>
                        <select id="type" name="type">
                            <option value="manual">Thủ công</option>
                            <option value="loyalty">Đổi điểm</option>
                            <option value="redemption">Mã quy đổi (Redemption)</option>
                            <option value="weekly">Hàng tuần</option>
                            <option value="new_member">Thành viên mới</option>
                        </select>
                    </div>
                    <div class="form-group" id="pointsGroup" style="display: none;">
                        <label>Điểm yêu cầu</label>
                        <input type="number" id="points_required" name="points_required" value="0">
                    </div>
                    <div class="form-group" style="flex-direction: row; align-items: center; gap: 10px;">
                        <input type="checkbox" id="is_public" name="is_public" checked style="width: 20px; height: 20px;">
                        <label for="is_public" style="margin-bottom: 0;">Hiển thị công khai (Khách có thể thấy)</label>
                    </div>
                    <div class="form-group" style="flex-direction: row; align-items: center; gap: 10px;">
                        <input type="checkbox" id="is_active" name="is_active" checked style="width: 20px; height: 20px;">
                        <label for="is_active" style="margin-bottom: 0;">Đang hoạt động</label>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" id="cancelBtn">HỦY BỎ</button>
                    <button type="submit" class="btn-cyber">LƯU CẤU HÌNH</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../../shared/js/global.js"></script>
    <script src="../../dashboard/js/sidebar.js"></script>
    <script src="../js/discounts.js"></script>
</body>
</html>
