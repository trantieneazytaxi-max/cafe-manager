<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Cài đặt hệ thống - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../dashboard/css/admin-dashboard.css">
    <style>
        .settings-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2rem; margin-top: 1rem; }
        .settings-card { 
            background: rgba(13, 13, 26, 0.7); 
            backdrop-filter: blur(15px); 
            border-radius: 24px; 
            padding: 2rem; 
            border: 1px solid rgba(0, 243, 255, 0.2);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .settings-card:hover {
            border-color: #00f3ff;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.15);
        }
        .settings-card h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            color: #ff0055;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.3);
        }
        .settings-card h3 i { color: #00f3ff; font-size: 1.1rem; }
        
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { 
            display: block; 
            margin-bottom: 0.8rem; 
            font-weight: 500; 
            font-size: 0.8rem; 
            color: #8892b0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-group input { 
            width: 100%; 
            padding: 1rem; 
            background: rgba(0, 243, 255, 0.05);
            border: 1px solid rgba(0, 243, 255, 0.1);
            border-radius: 12px; 
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: #00f3ff;
            background: rgba(0, 243, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }
        
        .btn-cyber {
            background: linear-gradient(135deg, #ff0055, #ff0088);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.4);
            transition: all 0.3s ease;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-cyber:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 35px rgba(255, 0, 85, 0.6);
            text-shadow: 0 0 8px #fff;
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid #00f3ff;
            color: #00f3ff;
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            transition: all 0.3s ease;
        }
        .btn-outline:hover {
            background: rgba(0, 243, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
        }

        @media (max-width: 992px) { .settings-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar Placeholder -->
        <div id="sidebar-placeholder"></div>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <div>
                    <h2 style="font-family: 'Orbitron', sans-serif; letter-spacing: 2px; color: #fff; text-shadow: 0 0 10px #00f3ff;">CÀI ĐẶT HỆ THỐNG</h2>
                </div>
                <button class="btn-cyber" onclick="saveSettings()">
                    <i class="fas fa-save"></i> LƯU CẤU HÌNH
                </button>
            </div>

            <div class="settings-grid">
                <!-- Store Info -->
                <div class="settings-card">
                    <h3><i class="fas fa-store"></i> Thông tin cửa hàng</h3>
                    <div class="form-group">
                        <label>Tên cửa hàng</label>
                        <input type="text" id="storeName" value="Cà Phê Thông Minh">
                    </div>
                    <div class="form-group">
                        <label>Địa chỉ cửa hàng</label>
                        <input type="text" id="storeAddress" value="123 Đường Cà Phê, Quận 1, TP.HCM">
                    </div>
                    <div class="form-group">
                        <label>Hotline liên hệ</label>
                        <input type="text" id="storePhone" value="0123 456 789">
                    </div>
                    <div class="form-group">
                        <label>Email hệ thống</label>
                        <input type="email" id="storeEmail" value="contact@cafe.com">
                    </div>
                </div>

                <!-- Financial Info -->
                <div class="settings-card">
                    <h3><i class="fas fa-money-bill-wave"></i> Cấu hình tài chính</h3>
                    <div class="form-group">
                        <label>Thuế giá trị gia tăng (VAT %)</label>
                        <input type="number" id="vatRate" value="10">
                    </div>
                    <div class="form-group">
                        <label>Phí vận chuyển chuẩn (VND)</label>
                        <input type="number" id="defaultShipping" value="20000">
                    </div>
                    <div class="form-group">
                        <label>Ngưỡng miễn phí vận chuyển (VND)</label>
                        <input type="number" id="freeShipThreshold" value="200000">
                    </div>
                    <div style="margin-top: 2rem; padding: 1rem; background: rgba(255, 0, 85, 0.05); border-radius: 12px; border-left: 4px solid #ff0055;">
                        <p style="font-size: 0.75rem; color: #ff0055; font-weight: 600;">LƯU Ý: Các thông số này sẽ áp dụng ngay lập tức cho toàn bộ hóa đơn mới.</p>
                    </div>
                </div>
            </div>

            <!-- Security Section -->
            <div class="settings-card" style="margin-top: 2rem; max-width: 600px;">
                <h3><i class="fas fa-shield-alt"></i> Quản trị & Bảo mật</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                    <div class="form-group">
                        <label>Mật khẩu hiện tại</label>
                        <input type="password" placeholder="••••••••">
                    </div>
                    <div class="form-group">
                        <label>Mật khẩu quản trị mới</label>
                        <input type="password" placeholder="Nhập mật khẩu mới">
                    </div>
                </div>
                <div style="display: flex; justify-content: flex-end; margin-top: 1rem;">
                    <button class="btn-outline">CẬP NHẬT BẢO MẬT</button>
                </div>
            </div>
        </main>
    </div>

    <script src="../../dashboard/js/sidebar.js"></script>
    <script>
        function saveSettings() {
            alert('Đã cập nhật cấu hình hệ thống thành công!');
        }
    </script>
</body>
</html>
