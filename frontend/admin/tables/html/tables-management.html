<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Quản lý bàn - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../dashboard/css/admin-dashboard.css">
    <style>
        .stat-mini-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem; }
        .stat-mini-card { background: rgba(13, 13, 26, 0.7); border-radius: 20px; padding: 1.5rem; border: 1px solid rgba(0, 243, 255, 0.2); }
        .stat-mini-card h4 { font-size: 0.7rem; color: #8892b0; margin-bottom: 0.5rem; text-transform: uppercase; font-family: 'Orbitron', sans-serif; letter-spacing: 1px; }
        .stat-mini-card p { font-size: 1.4rem; font-weight: 700; font-family: 'Orbitron', sans-serif; color: #fff; text-shadow: 0 0 10px rgba(0, 243, 255, 0.5); }

        .tables-grid-admin { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem; margin-top: 1rem; }
        .table-card-admin { 
            background: rgba(13, 13, 26, 0.6); 
            backdrop-filter: blur(10px);
            border-radius: 24px; 
            padding: 2rem; 
            text-align: center; 
            border: 1px solid rgba(0, 243, 255, 0.2); 
            position: relative;
            transition: all 0.3s ease; 
            overflow: hidden;
        }
        .table-card-admin::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: #3498db;
        }
        .table-card-admin.occupied::before { background: #ff0055; box-shadow: 0 0 10px #ff0055; }
        .table-card-admin.reserved::before { background: #f1c40f; box-shadow: 0 0 10px #f1c40f; }
        .table-card-admin.available::before { background: #00ff88; box-shadow: 0 0 10px #00ff88; }
        
        .table-card-admin:hover { transform: translateY(-5px); border-color: #00f3ff; box-shadow: 0 0 25px rgba(0, 243, 255, 0.2); }
        .table-num { font-size: 1.8rem; font-weight: 800; margin-bottom: 0.5rem; font-family: 'Orbitron', sans-serif; color: #fff; }
        .table-cap { font-size: 0.8rem; color: #8892b0; margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 1px; }
        
        @media (max-width: 992px) { .stat-mini-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar Placeholder -->
        <div id="sidebar-placeholder"></div>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <div>
                    <h2 style="font-family: 'Orbitron', sans-serif; letter-spacing: 2px; color: #fff; text-shadow: 0 0 10px #00f3ff;">QUẢN LÝ BÀN</h2>
                </div>
                <button class="btn-add" onclick="openAddTableModal()">
                    <i class="fas fa-plus"></i> THÊM BÀN MỚI
                </button>
            </div>

            <!-- Stats Overview Like Reports -->
            <div class="stat-mini-grid">
                <div class="stat-mini-card">
                    <h4>Tổng số bàn</h4>
                    <p id="totalTablesCount">0</p>
                </div>
                <div class="stat-mini-card">
                    <h4>Đang trống</h4>
                    <p id="availableTablesCount" style="color: #00ff88;">0</p>
                </div>
                <div class="stat-mini-card">
                    <h4>Đang có khách</h4>
                    <p id="occupiedTablesCount" style="color: #ff0055;">0</p>
                </div>
                <div class="stat-mini-card">
                    <h4>Đã đặt trước</h4>
                    <p id="reservedTablesCount" style="color: #f1c40f;">0</p>
                </div>
            </div>

            <div class="data-table-card">
                <div class="filter-bar" style="margin-bottom: 2rem;">
                    <select id="locationFilter" onchange="loadTables()" style="padding: 0.8rem 1.5rem; border-radius: 12px; background: rgba(13, 13, 26, 0.8); border: 1px solid rgba(0, 243, 255, 0.2); color: #fff; font-family: 'Orbitron', sans-serif; font-size: 0.75rem;">
                        <option value="all">TẤT CẢ KHU VỰC</option>
                        <option value="Tầng 1">TẦNG 1</option>
                        <option value="Tầng 2">TẦNG 2</option>
                        <option value="Sân vườn">SÂN VƯỜN</option>
                    </select>
                </div>
                
                <div id="tablesContainer" class="tables-grid-admin">
                    <!-- Tables will be loaded here -->
                    <p style="text-align: center; grid-column: 1/-1; color: #8892b0; padding: 3rem;">Đang tải danh sách bàn...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="tableModal" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <h3 id="tableModalTitle" style="margin-bottom: 2rem; font-family: 'Orbitron', sans-serif; color: #00f3ff; text-align: center; letter-spacing: 2px;">THÊM BÀN MỚI</h3>
            <form id="tableForm">
                <input type="hidden" id="editTableId">
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label>Số bàn</label>
                    <input type="number" id="tableNumber" required>
                </div>
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label>Sức chứa (người)</label>
                    <input type="number" id="tableCapacity" required>
                </div>
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label>Khu vực</label>
                    <select id="tableLocation">
                        <option value="Tầng 1">Tầng 1</option>
                        <option value="Tầng 2">Tầng 2</option>
                        <option value="Sân vườn">Sân vườn</option>
                    </select>
                </div>
                <div class="form-group" id="statusGroup" style="display: none; margin-bottom: 1.5rem;">
                    <label>Trạng thái</label>
                    <select id="tableStatus">
                        <option value="available">Trống</option>
                        <option value="occupied">Đang dùng</option>
                        <option value="reserved">Đã đặt</option>
                    </select>
                </div>
                <div style="display: flex; gap: 15px; justify-content: flex-end; margin-top: 2.5rem;">
                    <button type="button" onclick="closeTableModal()" style="padding: 0.8rem 2rem; border-radius: 12px; background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #fff; cursor: pointer; font-family: 'Orbitron', sans-serif; font-size: 0.8rem;">HỦY</button>
                    <button type="submit" class="btn-add">LƯU THÔNG TIN</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../dashboard/js/sidebar.js"></script>
    <script src="../js/tables-management.js"></script>
</body>
</html>
