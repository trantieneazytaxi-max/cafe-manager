<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Quản lý bàn - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../dashboard/css/admin-dashboard.css">
    <script src="../../../../shared/js/global.js"></script>
    <style>
        .main-content {
            background: transparent !important;
            font-family: 'Inter', sans-serif;
        }

        /* Adaptive Modal & Inputs */
        .modal-content {
            background: white;
            color: #1F2937;
            transition: all 0.3s ease;
        }
        body:not(.reverie-theme) .modal-content {
            background: rgba(13, 13, 26, 0.95) !important;
            border: 1px solid rgba(0, 243, 255, 0.3) !important;
            color: #e0e0e0 !important;
            backdrop-filter: blur(20px);
        }
        
        .form-group label { color: #4B5563; }
        body:not(.reverie-theme) .form-group label { color: #8892b0; }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            border: 1px solid #E5E7EB;
            background: #F9FAFB;
            color: #1F2937;
            transition: all 0.3s ease;
        }
        body:not(.reverie-theme) .form-group input,
        body:not(.reverie-theme) .form-group select {
            background: rgba(0, 243, 255, 0.05) !important;
            border: 1px solid rgba(0, 243, 255, 0.2) !important;
            color: #fff !important;
        }

        .stat-mini-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-mini-card { 
            background: white; 
            border-radius: 20px; 
            padding: 1.5rem; 
            border: 1px solid rgba(126, 34, 206, 0.1); 
            box-shadow: 0 4px 20px rgba(126, 34, 206, 0.05);
        }
        body:not(.reverie-theme) .stat-mini-card {
            background: rgba(13, 13, 26, 0.7);
            border-color: rgba(0, 243, 255, 0.2);
        }

        .tables-grid-admin { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 2rem; margin-top: 1rem; }
        .table-card-admin { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(20px);
            border-radius: 24px; 
            padding: 2.5rem 1.5rem; 
            text-align: center; 
            border: 1px solid rgba(126, 34, 206, 0.1); 
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 10px 30px rgba(126, 34, 206, 0.05);
        }
        body:not(.reverie-theme) .table-card-admin {
            background: rgba(13, 13, 26, 0.7);
            border-color: rgba(0, 243, 255, 0.2);
        }
        
        .table-card-admin:hover { 
            transform: translateY(-10px); 
            border-color: #7E22CE; 
            box-shadow: 0 20px 40px rgba(126, 34, 206, 0.12); 
            background: white;
        }
        body:not(.reverie-theme) .table-card-admin:hover {
            border-color: #00f3ff;
            background: rgba(0, 243, 255, 0.1);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
        }

        .table-num { 
            font-size: 2rem; 
            font-weight: 800; 
            margin-bottom: 0.2rem; 
            font-family: 'Outfit', sans-serif; 
            color: #1F2937; 
            letter-spacing: -0.5px;
        }
        body:not(.reverie-theme) .table-num { color: #fff; }

        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: none;
            background: #f3f4f6;
            color: #7E22CE;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        body:not(.reverie-theme) .btn-icon {
            background: rgba(0, 243, 255, 0.1);
            color: #00f3ff;
        }
        
        @media (max-width: 992px) { .stat-mini-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar Placeholder -->
        <div id="sidebar-placeholder"></div>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <div class="title-section">
                    <h2 id="pageTitle" style="font-family: 'Outfit', sans-serif; color: #fff; font-weight: 800; margin: 0; text-shadow: 0 0 10px rgba(0,243,255,0.3);">QUẢN LÝ BÀN</h2>
                </div>
                <button class="btn-add" onclick="openAddTableModal()" style="display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-plus"></i> THÊM BÀN MỚI
                </button>
            </div>

            <!-- Stats Overview -->
            <div class="stat-mini-grid">
                <div class="stat-mini-card">
                    <h4>Tổng số bàn</h4>
                    <p id="totalTablesCount">0</p>
                </div>
                <div class="stat-mini-card">
                    <h4>Đang trống</h4>
                    <p id="availableTablesCount" style="color: #10b981;">0</p>
                </div>
                <div class="stat-mini-card">
                    <h4>Đang có khách</h4>
                    <p id="occupiedTablesCount" style="color: #ef4444;">0</p>
                </div>
                <div class="stat-mini-card">
                    <h4>Đã đặt trước</h4>
                    <p id="reservedTablesCount" style="color: #f59e0b;">0</p>
                </div>
            </div>

            <div class="data-table-card" style="background: transparent; border: none; box-shadow: none; padding: 0;">
                <div class="filter-bar" style="margin-bottom: 2rem;">
                    <select id="locationFilter" onchange="loadTables()" style="min-width: 200px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
                        <option value="all">TẤT CẢ KHU VỰC</option>
                        <option value="Tầng 1">TẦNG 1</option>
                        <option value="Tầng 2">TẦNG 2</option>
                        <option value="Sân vườn">SÂN VƯỜN</option>
                    </select>
                </div>
                
                <div id="tablesContainer" class="tables-grid-admin">
                    <!-- Tables will be loaded here -->
                    <p style="text-align: center; grid-column: 1/-1; color: #6B7280; padding: 3rem;">Đang tải danh sách bàn...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Table -->
    <div id="tableModal" class="modal">
        <div class="modal-content" style="max-width: 450px; border-radius: 24px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h3 id="modalTitle" style="margin-bottom: 0; font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.5rem;">THÔNG TIN BÀN</h3>
                <button type="button" class="close-modal" id="closeTableModalX" style="background: rgba(128,128,128,0.1); border: none; color: inherit; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="tableForm">
                <input type="hidden" id="editTableId">
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label>Số bàn</label>
                    <input type="number" id="tableNumber" required>
                </div>
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label>Sức chứa (người)</label>
                    <input type="number" id="tableCapacity" required>
                </div>
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label>Khu vực</label>
                    <select id="tableLocation">
                        <option value="Tầng 1">Tầng 1</option>
                        <option value="Tầng 2">Tầng 2</option>
                        <option value="Sân vườn">Sân vườn</option>
                    </select>
                </div>
                <div class="form-group" id="statusGroup" style="display: none; margin-bottom: 1.5rem;">
                    <label>Trạng thái</label>
                    <select id="tableStatus">
                        <option value="available">Trống</option>
                        <option value="occupied">Đang dùng</option>
                        <option value="reserved">Đã đặt</option>
                    </select>
                </div>
                <div style="display: flex; gap: 15px; justify-content: flex-end; margin-top: 2.5rem;">
                    <button type="button" onclick="closeTableModal()" class="btn-secondary" style="padding: 0.8rem 2rem; border-radius: 12px; cursor: pointer; font-weight: 600;">HỦY</button>
                    <button type="submit" class="btn-primary" style="padding: 0.8rem 2rem; border-radius: 12px; border: none; color: white; cursor: pointer; font-weight: 600;">LƯU THÔNG TIN</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../../../shared/js/global.js"></script>
    <script src="../../dashboard/js/sidebar.js"></script>
    <script src="../js/tables-management.js"></script>
</body>
</html>
