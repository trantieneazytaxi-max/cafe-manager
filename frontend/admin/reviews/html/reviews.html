<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Đánh giá - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../dashboard/css/admin-dashboard.css">
    <script src="../../../../shared/js/global.js"></script>
    <style>
        .reviews-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .review-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(126, 34, 206, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }
        /* Cyberpunk Mode Overrides */
        body:not(.reverie-theme) .review-card {
            background: rgba(13, 13, 26, 0.8) !important;
            border: 1px solid rgba(0, 243, 255, 0.3) !important;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.1) !important;
            color: #e0e0e0;
        }
        .review-card:hover { transform: translateY(-5px); }
        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        .user-info-meta { display: flex; gap: 12px; align-items: center; }
        .user-avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid #00f3ff; }
        body.reverie-theme .user-avatar { border-color: var(--rv-purple-light); }
        
        .user-name { font-weight: 700; color: #fff; font-family: 'Orbitron', sans-serif; font-size: 0.9rem; }
        body.reverie-theme .user-name { color: var(--rv-text); font-family: 'Outfit', sans-serif; }

        .order-info { font-size: 0.75rem; color: #8892b0; }
        .rating { color: #f1c40f; font-size: 0.9rem; }
        .review-comment { margin: 15px 0; font-size: 0.95rem; line-height: 1.6; color: #ccc; font-style: italic; }
        body.reverie-theme .review-comment { color: #4B5563; }

        .reply-box {
            background: rgba(0, 243, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
            border-left: 4px solid #00f3ff;
        }
        body.reverie-theme .reply-box {
            background: #F9FAFB;
            border-left-color: var(--rv-purple);
        }
        .reply-header { font-size: 0.75rem; font-weight: 700; color: #00f3ff; margin-bottom: 5px; text-transform: uppercase; }
        body.reverie-theme .reply-header { color: var(--rv-purple); }

        .reply-content { font-size: 0.9rem; color: #e0e0e0; }
        body.reverie-theme .reply-content { color: #374151; }

        .btn-reply {
            background: #00f3ff;
            color: #0a0a1a;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 700;
            margin-top: 10px;
            font-family: 'Orbitron', sans-serif;
        }
        body.reverie-theme .btn-reply {
            background: var(--rv-purple);
            color: white;
            font-family: 'Inter', sans-serif;
        }
        .modal-textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(0, 243, 255, 0.2);
            margin-bottom: 15px;
            font-family: inherit;
            background: rgba(0, 243, 255, 0.05);
            color: #fff;
            transition: all 0.3s;
        }
        body.reverie-theme .modal-textarea {
            background: #fff;
            border-color: var(--rv-pink-soft);
            color: var(--rv-text);
        }
    </style>
</head>
<body class="admin-body">
    <div class="admin-container">
        <div id="sidebar-placeholder"></div>
        <main class="main-content">
            <div class="top-bar">
                <h2 style="font-family: 'Playfair Display', serif; color: var(--rv-purple-deep); font-weight: 800;">QUẢN LÝ ĐÁNH GIÁ</h2>
            </div>

            <div id="reviewsList" class="reviews-container">
                <div style="text-align: center; grid-column: 1/-1; padding: 50px;">
                    <i class="fas fa-spinner fa-spin fa-2x"></i>
                    <p>Đang tải đánh giá...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Reply Modal -->
    <div id="replyModal" class="modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div class="modal-content" style="background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 450px;">
            <h3 style="font-family: 'Outfit', sans-serif; margin-bottom: 20px;">Phản hồi đánh giá</h3>
            <input type="hidden" id="replyReviewId">
            <textarea id="replyText" class="modal-textarea" placeholder="Nhập phản hồi của bạn..."></textarea>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button onclick="closeReplyModal()" class="btn-secondary">Hủy</button>
                <button onclick="submitReply()" class="btn-primary">Gửi phản hồi</button>
            </div>
        </div>
    </div>

    <script src="../../dashboard/js/sidebar.js"></script>
    <script src="../js/reviews.js"></script>
</body>
</html>
