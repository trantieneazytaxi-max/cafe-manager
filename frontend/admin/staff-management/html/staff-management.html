<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Quản lý nhân viên - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../dashboard/css/admin-dashboard.css">
    <style>
        .staff-avatar-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1px solid #00f3ff; }
        .modal-large { max-width: 800px !important; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1rem; }
        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
        .btn-action-group { display: flex; gap: 8px; justify-content: flex-end; }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar Placeholder -->
        <div id="sidebar-placeholder"></div>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <div>
                    <h2 style="font-family: 'Orbitron', sans-serif; letter-spacing: 1px;">QUẢN LÝ NHÂN VIÊN</h2>
                </div>
                <button class="btn-add" id="addStaffBtn">
                    <i class="fas fa-plus"></i> THÊM NHÂN VIÊN
                </button>
            </div>

            <div class="data-table-card">
                <div class="filter-bar" style="margin-bottom: 1.5rem;">
                    <div style="position: relative; flex-grow: 1;">
                        <i class="fas fa-search" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #00f3ff;"></i>
                        <input type="text" id="searchInput" placeholder="Tìm theo tên, email, SĐT..." style="width: 100%; padding: 0.8rem 1rem 0.8rem 2.5rem; border-radius: 12px; background: rgba(0, 243, 255, 0.05); border: 1px solid rgba(0, 243, 255, 0.2); color: #fff;">
                    </div>
                </div>

                <div style="overflow-x: auto;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Avatar</th>
                                <th>Họ tên</th>
                                <th>Chức vụ</th>
                                <th>Email/SĐT</th>
                                <th>Trạng thái</th>
                                <th style="text-align: right;">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="staffTableBody">
                            <tr><td colspan="6" style="text-align: center; padding: 2rem;">Đang tải dữ liệu...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Staff -->
    <div id="staffModal" class="modal">
        <div class="modal-content modal-large">
            <h3 id="modalTitle" style="margin-bottom: 1.5rem; font-family: 'Orbitron', sans-serif; color: #00f3ff;">THÔNG TIN NHÂN VIÊN</h3>
            <form id="staffForm">
                <input type="hidden" id="staffId">
                <div class="form-group" style="text-align: center; margin-bottom: 2rem;">
                    <div style="position: relative; display: inline-block;">
                        <img id="avatarPreview" src="https://ui-avatars.com/api/?background=00f3ff&color=fff&rounded=true&size=128" style="width: 120px; height: 120px; border-radius: 50%; border: 3px solid #00f3ff; object-fit: cover; cursor: pointer;">
                        <div id="changeAvatarBtn" style="position: absolute; bottom: 5px; right: 5px; background: #ff0055; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid #121212;">
                            <i class="fas fa-camera" style="color: #fff; font-size: 0.8rem;"></i>
                        </div>
                    </div>
                    <input type="file" id="staffAvatarInput" accept="image/*" style="display: none;">
                    <input type="hidden" id="staffAvatarUrl">
                    <p style="font-size: 0.75rem; color: #8892b0; margin-top: 0.5rem;">Click để tải lên ảnh đại diện</p>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Họ và tên</label>
                        <input type="text" id="fullName" required>
                    </div>
                    <div class="form-group">
                        <label>Chức vụ</label>
                        <select id="position">
                            <option value="Nhân viên phục vụ">Nhân viên phục vụ</option>
                            <option value="Pha chế">Pha chế</option>
                            <option value="Thu ngân">Thu ngân</option>
                            <option value="Quản lý ca">Quản lý ca</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label>Số điện thoại</label>
                        <input type="tel" id="phone" required>
                    </div>
                </div>
                <div class="form-group" id="passwordGroup">
                    <label>Mật khẩu (để trống nếu không đổi)</label>
                    <input type="password" id="password">
                </div>
                <div class="form-group">
                    <label>Trạng thái</label>
                    <select id="isActive">
                        <option value="1">Đang làm việc</option>
                        <option value="0">Đã nghỉ việc</option>
                    </select>
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 2rem;">
                    <button type="button" id="cancelModalBtn" style="padding: 0.8rem 1.5rem; border-radius: 12px; background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #fff; cursor: pointer;">Hủy</button>
                    <button type="submit" class="btn-add">LƯU THÔNG TIN</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../dashboard/js/sidebar.js"></script>
    <script src="../js/staff-management.js"></script>
</body>
</html>
