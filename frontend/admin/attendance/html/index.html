<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Quản lý chấm công - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../dashboard/css/admin-dashboard.css">
    <style>
        .attendance-table th, .attendance-table td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(0, 243, 255, 0.1); }
        .status-active { color: #00ff88; font-weight: 600; text-shadow: 0 0 5px rgba(0, 255, 136, 0.3); }
        .status-completed { color: #8892b0; }
        .ip-badge { font-size: 0.75rem; padding: 4px 8px; background: rgba(0, 243, 255, 0.1); color: #00f3ff; border: 1px solid rgba(0, 243, 255, 0.2); border-radius: 4px; font-family: 'Orbitron', monospace; }
        .header-stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .header-stat-card { background: rgba(13, 13, 26, 0.7); border-radius: 16px; padding: 15px 25px; border: 1px solid rgba(0, 243, 255, 0.2); flex: 1; }
        .header-stat-card h4 { font-size: 0.7rem; color: #8892b0; margin-bottom: 5px; text-transform: uppercase; font-family: 'Orbitron', sans-serif; }
        .header-stat-card p { font-size: 1.5rem; font-weight: 700; color: #fff; font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar Placeholder -->
        <div id="sidebar-placeholder"></div>

        <main class="main-content">
            <div class="top-bar">
                <div>
                    <h2 style="font-family: 'Orbitron', sans-serif; letter-spacing: 2px; color: #fff; text-shadow: 0 0 10px #00f3ff;">LỊCH SỬ CHẤM CÔNG</h2>
                    <p style="color: #8892b0; font-size: 0.85rem;">Theo dõi thời gian làm việc của nhân viên</p>
                </div>
                <div style="display: flex; gap: 15px; align-items: center;">
                    <input type="date" id="filterDate" style="padding: 10px; border-radius: 8px; border: 1px solid rgba(0, 243, 255, 0.2); background: rgba(0, 0, 0, 0.3); color: white;">
                    <button id="refreshBtn" class="refresh-btn">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </div>

            <div class="data-table-card">
                <div style="overflow-x: auto;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Nhân viên</th>
                                <th>Check-in</th>
                                <th>Check-out</th>
                                <th>Thời gian</th>
                                <th>Địa chỉ IP</th>
                                <th>Trạng thái</th>
                            </tr>
                        </thead>
                        <tbody id="attendanceBody">
                            <tr>
                                <td colspan="6" style="text-align: center; padding: 3rem; color: #8892b0;">Đang tải dữ liệu...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="../../../shared/js/api.js"></script>
    <script src="../../../shared/js/global.js"></script>
    <script src="../../dashboard/js/sidebar.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadAttendance();
            document.getElementById('refreshBtn').onclick = loadAttendance;
            document.getElementById('filterDate').onchange = loadAttendance;
        });

        async function loadAttendance() {
            try {
                const token = localStorage.getItem('token');
                const date = document.getElementById('filterDate').value;
                let url = 'http://localhost:5000/api/attendance/all';
                if (date) url += `?date=${date}`;
                
                const response = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await response.json();
                const data = Array.isArray(result) ? result : [];
                
                const body = document.getElementById('attendanceBody');
                if (data.length === 0) {
                    body.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 3rem; color: #8892b0;">CHƯA CÓ DỮ LIỆU CHẤM CÔNG</td></tr>';
                    return;
                }
                
                body.innerHTML = data.map(record => {
                    const checkIn = new Date(record.check_in);
                    const checkOut = record.check_out ? new Date(record.check_out) : null;
                    let duration = '---';
                    if (checkOut) {
                        const diff = Math.floor((checkOut - checkIn) / 60000); // minutes
                        const h = Math.floor(diff / 60);
                        const m = diff % 60;
                        duration = `${h}h ${m}m`;
                    }
                    
                    return `
                        <tr>
                            <td>
                                <strong style="color: #fff;">${record.full_name}</strong><br>
                                <small style="color: #8892b0; font-family: 'Orbitron', monospace; font-size: 0.7rem;">ID: ${record.user_id}</small>
                            </td>
                            <td>${checkIn.toLocaleString('vi-VN')}</td>
                            <td>${checkOut ? checkOut.toLocaleString('vi-VN') : '<span style="color: #00ff88; font-style: italic;">Đang làm việc...</span>'}</td>
                            <td style="font-family: 'Orbitron', monospace; font-weight: 600;">${duration}</td>
                            <td><span class="ip-badge">${record.ip_address || 'N/A'}</span></td>
                            <td class="${record.check_out ? 'status-completed' : 'status-active'}">
                                ${record.check_out ? '<i class="fas fa-check-circle"></i> Đã kết thúc' : '<i class="fas fa-clock"></i> Đang làm'}
                            </td>
                        </tr>
                    `;
                }).join('');
            } catch (e) {
                console.error(e);
            }
        }
    </script>
</body>
</html>
