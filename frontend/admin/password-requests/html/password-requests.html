<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Yêu cầu đặt lại mật khẩu - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../dashboard/css/admin-dashboard.css">
    <style>
        .stat-mini-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
        .stat-mini-card { background: rgba(13, 13, 26, 0.7); border-radius: 20px; padding: 1.5rem; border: 1px solid rgba(0, 243, 255, 0.2); }
        .stat-mini-card h4 { font-size: 0.7rem; color: #8892b0; margin-bottom: 0.5rem; text-transform: uppercase; font-family: 'Orbitron', sans-serif; letter-spacing: 1px; }
        .stat-mini-card p { font-size: 1.4rem; font-weight: 700; font-family: 'Orbitron', sans-serif; color: #fff; text-shadow: 0 0 10px rgba(0, 243, 255, 0.5); }
        @media (max-width: 768px) { .stat-mini-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar Placeholder -->
        <div id="sidebar-placeholder"></div>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <div>
                    <h2 style="font-family: 'Orbitron', sans-serif; letter-spacing: 2px; color: #fff; text-shadow: 0 0 10px #00f3ff;">YÊU CẦU ĐẶT LẠI MẬT KHẨU</h2>
                </div>
            </div>

            <!-- Stats Overview Like Reports -->
            <div class="stat-mini-grid">
                <div class="stat-mini-card">
                    <h4>Chưa xử lý</h4>
                    <p id="pendingRequestsCount" style="color: #ff0055;">0</p>
                </div>
                <div class="stat-mini-card">
                    <h4>Đã hoàn thành</h4>
                    <p id="completedRequestsCount" style="color: #00ff88;">0</p>
                </div>
                <div class="stat-mini-card">
                    <h4>Tổng yêu cầu</h4>
                    <p id="totalRequestsCount">0</p>
                </div>
            </div>

            <div class="data-table-card">
                <div style="overflow-x: auto;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Nhân viên</th>
                                <th>Email</th>
                                <th>SĐT</th>
                                <th>Thời gian</th>
                                <th>Trạng thái</th>
                                <th style="text-align: right;">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="requestTableBody">
                            <tr><td colspan="6" style="text-align: center; padding: 3rem; color: #8892b0;">Đang tải danh sách yêu cầu...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="../../dashboard/js/sidebar.js"></script>
    <script src="../js/password-requests.js"></script>
</body>
</html>
