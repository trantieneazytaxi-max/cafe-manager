<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Đăng nhập - Cà Phê Thông Minh</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/admin-login.css">
</head>

<body>
    <div class="admin-auth-container">
        <div class="admin-auth-card">
            <div class="admin-logo">
                <i class="fas fa-mug-hot"></i>
                <span>Cà Phê <span class="highlight">Thông Minh</span></span>
                <span class="admin-badge">ADMIN</span>
            </div>

            <h2>Đăng nhập Admin</h2>
            <p class="subtitle">Quản lý hệ thống cà phê thông minh</p>

            <form id="loginForm" class="admin-auth-form">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Email" required>
                </div>

                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Mật khẩu" required>
                    <i class="fas fa-eye-slash toggle-password" data-target="password"></i>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe"> Ghi nhớ đăng nhập
                    </label>
                    <a href="#" class="forgot-password">Quên mật khẩu?</a>
                </div>

                <button type="submit" class="admin-auth-btn">
                    <i class="fas fa-sign-in-alt"></i> Đăng nhập
                </button>
            </form>

            <div class="admin-auth-footer">
                <p>Chưa có tài khoản? <a href="admin-register.html">Đăng ký ngay</a></p>
                <p><a href="../../../main.html">← Quay lại trang chủ</a></p>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="../js/admin-login.js"></script>
</body>
</html>
