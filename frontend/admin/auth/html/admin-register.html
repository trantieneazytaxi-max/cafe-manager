<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Đăng ký - Cà Phê Thông Minh</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/admin-register.css">
</head>
<body>
    <div class="admin-auth-container">
        <div class="admin-auth-card">
            <div class="admin-logo">
                <i class="fas fa-mug-hot"></i>
                <span>Cà Phê <span class="highlight">Thông Minh</span></span>
                <span class="admin-badge">ADMIN</span>
            </div>
            
            <h2>Đăng ký tài khoản Admin</h2>
            <p class="subtitle">Tạo tài khoản quản trị hệ thống</p>

            <form id="registerForm" class="admin-auth-form">
                <div class="input-group">
                    <i class="fas fa-user-shield"></i>
                    <input type="text" id="fullName" placeholder="Họ và tên" required>
                </div>

                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Email" required>
                </div>

                <div class="input-group">
                    <i class="fas fa-phone-alt"></i>
                    <input type="tel" id="phone" placeholder="Số điện thoại" required>
                </div>

                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Mật khẩu" required>
                    <i class="fas fa-eye-slash toggle-password" data-target="password"></i>
                </div>

                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="confirmPassword" placeholder="Xác nhận mật khẩu" required>
                    <i class="fas fa-eye-slash toggle-password" data-target="confirmPassword"></i>
                </div>

                <div class="input-group">
                    <i class="fas fa-key"></i>
                    <input type="password" id="adminKey" placeholder="Mã đăng ký Admin" required>
                </div>

                <button type="submit" class="admin-auth-btn">
                    <i class="fas fa-user-plus"></i> Đăng ký
                </button>
            </form>

            <div class="admin-auth-footer">
                <p>Đã có tài khoản? <a href="admin-login.html">Đăng nhập ngay</a></p>
                <p><a href="../../../index.html">← Quay lại trang chủ</a></p>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="../js/admin-register.js"></script>
</body>
</html>
