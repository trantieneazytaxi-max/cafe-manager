<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Quản lý thực đơn - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../dashboard/css/admin-dashboard.css">
    <style>
        .stat-mini-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem; }
        .stat-mini-card { background: rgba(13, 13, 26, 0.7); border-radius: 20px; padding: 1.5rem; border: 1px solid rgba(0, 243, 255, 0.2); }
        .stat-mini-card h4 { font-size: 0.7rem; color: #8892b0; margin-bottom: 0.5rem; text-transform: uppercase; font-family: 'Orbitron', sans-serif; letter-spacing: 1px; }
        .stat-mini-card p { font-size: 1.4rem; font-weight: 700; font-family: 'Orbitron', sans-serif; color: #fff; text-shadow: 0 0 10px rgba(0, 243, 255, 0.5); }
        
        .item-img { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; border: 1px solid rgba(0, 243, 255, 0.2); }
        @media (max-width: 992px) { .stat-mini-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar Placeholder -->
        <div id="sidebar-placeholder"></div>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <div>
                    <h2 style="font-family: 'Orbitron', sans-serif; letter-spacing: 2px; color: #fff; text-shadow: 0 0 10px #00f3ff;">QUẢN LÝ THỰC ĐƠN</h2>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <button class="btn-add" onclick="openAddCategoryModal()" style="background: rgba(255, 85, 0, 0.8); border: 1px solid rgba(255, 85, 0, 0.5);">
                        <i class="fas fa-folder-plus"></i> THÊM DANH MỤC
                    </button>
                    <button class="btn-add" onclick="openAddModal()">
                        <i class="fas fa-plus"></i> THÊM MÓN MỚI
                    </button>
                </div>
            </div>

            <!-- Stats Overview Like Reports -->
            <div class="stat-mini-grid">
                <div class="stat-mini-card">
                    <h4>Tổng số món</h4>
                    <p id="totalItemsCount">0</p>
                </div>
                <div class="stat-mini-card">
                    <h4>Đang kinh doanh</h4>
                    <p id="availableItemsCount" style="color: #00ff88;">0</p>
                </div>
                <div class="stat-mini-card">
                    <h4>Hết hàng</h4>
                    <p id="outOfStockCount" style="color: #f1c40f;">0</p>
                </div>
                <div class="stat-mini-card">
                    <h4>Đã ẩn</h4>
                    <p id="hiddenItemsCount" style="color: #ff0055;">0</p>
                </div>
            </div>

            <div class="data-table-card">
                <div class="filter-bar" style="margin-bottom: 2rem; gap: 1.5rem;">
                    <div style="position: relative; flex-grow: 1;">
                        <i class="fas fa-search" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #00f3ff;"></i>
                        <input type="text" id="searchInput" placeholder="Tìm kiếm món ăn..." onkeyup="filterItems()" style="width: 100%; padding: 0.8rem 1rem 0.8rem 2.5rem; border-radius: 12px; background: rgba(0, 243, 255, 0.05); border: 1px solid rgba(0, 243, 255, 0.2); color: #fff;">
                    </div>
                    <select id="categoryFilter" onchange="filterItems()" style="padding: 0.8rem 1.5rem; border-radius: 12px; background: rgba(13, 13, 26, 0.8); border: 1px solid rgba(0, 243, 255, 0.2); color: #fff; font-family: 'Orbitron', sans-serif; font-size: 0.75rem;">
                        <option value="all">TẤT CẢ DANH MỤC</option>
                    </select>
                    <select id="statusFilter" onchange="filterItems()" style="padding: 0.8rem 1.5rem; border-radius: 12px; background: rgba(13, 13, 26, 0.8); border: 1px solid rgba(0, 243, 255, 0.2); color: #fff; font-family: 'Orbitron', sans-serif; font-size: 0.75rem;">
                        <option value="all">TẤT CẢ TRẠNG THÁI</option>
                        <option value="available">ĐANG BÁN</option>
                        <option value="out_of_stock">HẾT HÀNG</option>
                        <option value="hidden">ĐÃ ẨN</option>
                    </select>
                </div>

                <div style="overflow-x: auto;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Ảnh</th>
                                <th>Tên món</th>
                                <th>Danh mục</th>
                                <th>Giá bán</th>
                                <th>Trạng thái</th>
                                <th style="text-align: right;">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="menuTableBody">
                            <tr><td colspan="6" style="text-align: center; padding: 3rem; color: #8892b0;">Đang tải dữ liệu thực đơn...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Item -->
    <div id="itemModal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <h3 id="modalTitle" style="margin-bottom: 2rem; font-family: 'Orbitron', sans-serif; color: #00f3ff; text-align: center; letter-spacing: 2px;">THÊM MÓN MỚI</h3>
            <form id="itemForm">
                <input type="hidden" id="itemId">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem;">
                    <div class="form-group">
                        <label>Tên món</label>
                        <input type="text" id="itemName" required>
                    </div>
                    <div class="form-group">
                        <label>Danh mục</label>
                        <select id="itemCategory" required></select>
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem;">
                    <div class="form-group">
                        <label>Giá bán mặc định (VNĐ)</label>
                        <input type="number" id="itemPrice" required>
                    </div>
                    <div class="form-group">
                        <label>Trạng thái hiển thị</label>
                        <select id="itemStatus">
                            <option value="available">Công khai (Available)</option>
                            <option value="hidden">Ẩn (Hidden)</option>
                        </select>
                    </div>
                </div>

                <!-- Customizations Section -->
                <div style="background: rgba(0, 243, 255, 0.05); border: 1px solid rgba(0, 243, 255, 0.1); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem;">
                    <h4 style="font-family: 'Orbitron', sans-serif; font-size: 0.8rem; color: #00f3ff; margin-bottom: 1rem; text-transform: uppercase;">Tùy chọn nâng cao</h4>
                    
                    <div style="display: flex; gap: 2rem; margin-bottom: 1.5rem; flex-wrap: wrap;">
                        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; color: #fff; font-size: 0.85rem;">
                            <input type="checkbox" id="isRecommended" style="width: 18px; height: 18px; accent-color: #ff0055;"> 
                            <span>Món bán chạy (Recommended)</span>
                        </label>
                        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; color: #fff; font-size: 0.85rem;">
                            <input type="checkbox" id="isPaused" style="width: 18px; height: 18px; accent-color: #f1c40f;"> 
                            <span>Tạm dừng món (Hết nguyên liệu)</span>
                        </label>
                        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; color: #fff; font-size: 0.85rem;">
                            <input type="checkbox" id="isCombo" onchange="toggleComboSection()" style="width: 18px; height: 18px; accent-color: #00f3ff;"> 
                            <span>Món Combo (Nhiều món đi kèm)</span>
                        </label>
                    </div>

                    <!-- Combo Items Selector -->
                    <div id="comboItemsSection" class="form-group" style="display: none; margin-bottom: 1.5rem; border-top: 1px solid rgba(0, 243, 255, 0.1); padding-top: 1rem;">
                        <label>Các món trong Combo</label>
                        <div id="comboItemsContainer" style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px;">
                            <!-- Combo items will be added here -->
                        </div>
                        <button type="button" onclick="addComboItemField()" style="background: transparent; border: 1px dashed #00f3ff; color: #00f3ff; padding: 5px 15px; border-radius: 8px; cursor: pointer; font-size: 0.7rem;">+ Thêm món vào Combo</button>
                    </div>


                    <div class="form-group" style="margin-bottom: 1rem;">
                        <label>Kích cỡ (Size)</label>
                        <div id="sizesContainer" style="display: flex; flex-direction: column; gap: 8px;">
                            <!-- Sizes will be added here -->
                        </div>
                        <button type="button" onclick="addSizeField()" style="margin-top: 10px; background: transparent; border: 1px dashed #00f3ff; color: #00f3ff; padding: 5px 15px; border-radius: 8px; cursor: pointer; font-size: 0.7rem;">+ Thêm size</button>
                    </div>

                    <div class="form-group" style="margin-top: 1.5rem;">
                        <label>Toppings (Tên, Giá)</label>
                        <div id="toppingsContainer" style="display: flex; flex-direction: column; gap: 8px;">
                            <!-- Toppings will be added here -->
                        </div>
                        <button type="button" onclick="addToppingField()" style="margin-top: 10px; background: transparent; border: 1px dashed #ff0055; color: #ff0055; padding: 5px 15px; border-radius: 8px; cursor: pointer; font-size: 0.7rem;">+ Thêm Topping</button>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label>Link hình ảnh</label>
                    <input type="text" id="itemImage" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label>Mô tả món ăn</label>
                    <textarea id="itemDesc" rows="2" style="width: 100%; padding: 1rem; border-radius: 12px; background: rgba(0, 243, 255, 0.05); border: 1px solid rgba(0, 243, 255, 0.1); color: #fff; font-family: 'Inter', sans-serif;"></textarea>
                </div>
                <div style="display: flex; gap: 15px; justify-content: flex-end; margin-top: 2.5rem;">
                    <button type="button" onclick="closeModal()" style="padding: 0.8rem 2rem; border-radius: 12px; background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #fff; cursor: pointer; font-family: 'Orbitron', sans-serif; font-size: 0.8rem;">HỦY</button>
                    <button type="submit" class="btn-add">LƯU THÔNG TIN</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Category -->
    <div id="categoryModal" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 500px;">
            <h3 style="margin-bottom: 2rem; font-family: 'Orbitron', sans-serif; color: #ff5500; text-align: center; letter-spacing: 2px;">THÊM DANH MỤC MỚI</h3>
            <form id="categoryForm">
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label>Tên danh mục</label>
                    <input type="text" id="categoryName" required placeholder="Ví dụ: Cà phê, Trà, Nước ép...">
                </div>
                <div class="form-group">
                    <label>Mô tả (tùy chọn)</label>
                    <textarea id="categoryDesc" rows="2" style="width: 100%; padding: 1rem; border-radius: 12px; background: rgba(0, 243, 255, 0.05); border: 1px solid rgba(0, 243, 255, 0.1); color: #fff; font-family: 'Inter', sans-serif;" placeholder="Mô tả ngắn gọn về danh mục..."></textarea>
                </div>
                <div style="display: flex; gap: 15px; justify-content: flex-end; margin-top: 2.5rem;">
                    <button type="button" onclick="closeCategoryModal()" style="padding: 0.8rem 2rem; border-radius: 12px; background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #fff; cursor: pointer; font-family: 'Orbitron', sans-serif; font-size: 0.8rem;">HỦY</button>
                    <button type="submit" class="btn-add">THÊM DANH MỤC</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../../shared/js/api.js"></script>
    <script src="../../../shared/js/global.js"></script>
    <script src="../../dashboard/js/sidebar.js"></script>
    <script src="../js/menu-management.js"></script>
</body>
</html>
