<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Quản lý đơn hàng - Nhân viên | Cà Phê Thông Minh</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/orders.css">
</head>
<body>
    <!-- Navbar (injected by shared staff-navbar.js) -->
    <nav class="navbar"></nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="page-header">
            <h1><i class="fas fa-receipt"></i> Quản lý đơn hàng</h1>
            <div class="header-actions">
                <button class="refresh-btn" id="refreshBtn">
                    <i class="fas fa-sync-alt"></i> Làm mới
                </button>
            </div>
        </div>

        <!-- Stats Summary -->
        <div class="stats-summary">
            <div class="stat-item">
                <i class="fas fa-clock"></i>
                <span>Chờ xử lý: <strong id="pendingCount">0</strong></span>
            </div>
            <div class="stat-item">
                <i class="fas fa-check-circle"></i>
                <span>Đã hoàn thành: <strong id="completedCount">0</strong></span>
            </div>
            <div class="stat-item">
                <i class="fas fa-chart-simple"></i>
                <span>Doanh thu hôm nay: <strong id="todayRevenue">0₫</strong></span>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" data-status="all">Tất cả</button>
            <button class="tab-btn" data-status="pending">Chờ xác nhận</button>
            <button class="tab-btn" data-status="confirmed">Đã xác nhận</button>
            <button class="tab-btn" data-status="preparing">Đang làm</button>
            <button class="tab-btn" data-status="ready">Có hàng</button>
            <button class="tab-btn" data-status="completed">Hoàn thành</button>
            <button class="tab-btn" data-status="cancelled">Đã hủy</button>
        </div>

        <!-- Order Type Filter -->
        <div class="order-type-filters">
            <span class="filter-label"><i class="fas fa-filter"></i> Loại đơn:</span>
            <button class="type-filter-btn active" data-type="all">Tất cả</button>
            <button class="type-filter-btn" data-type="dine-in"><i class="fas fa-chair"></i> Tại chỗ</button>
            <button class="type-filter-btn" data-type="takeaway"><i class="fas fa-shopping-bag"></i> Tự đến lấy</button>
            <button class="type-filter-btn" data-type="delivery"><i class="fas fa-truck"></i> Giao hàng</button>
        </div>

        <!-- Search -->
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Tìm kiếm theo mã đơn, bàn, khách hàng...">
        </div>

        <!-- Orders Table -->
        <div class="table-container">
            <table class="orders-table">
                <thead>
                    <tr>
                        <th>Mã đơn</th>
                        <th>Loại đơn</th>
                        <th>Bàn / Khách</th>
                        <th>Tổng tiền</th>
                        <th>Thời gian</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="ordersTableBody">
                    <tr>
                        <td colspan="7" class="loading">Đang tải...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Order Detail Modal -->
    <div id="orderModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Chi tiết đơn hàng #<span id="orderIdSpan"></span></h3>
                <button class="modal-close" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body" id="orderDetailBody">
                <!-- Nội dung sẽ load bằng JS -->
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" id="modalCancelBtn">Đóng</button>
                <button class="btn-confirm" id="confirmOrderBtn">Xác nhận hoàn thành</button>
            </div>
        </div>
    </div>

    <script src="../../../shared/js/staff-navbar.js"></script>
    <script src="../js/orders.js"></script>
</body>
</html>
