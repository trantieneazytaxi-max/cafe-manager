<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Quản lý bàn - Staff Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/tables.css">
</head>
<body>
    <!-- Navbar (injected by shared staff-navbar.js) -->
    <nav class="navbar"></nav>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Header -->
        <div class="page-header">
            <h1><i class="fas fa-chair"></i> Quản lý bàn</h1>
            <div class="header-actions">
                <button class="refresh-btn" id="refreshBtn">
                    <i class="fas fa-sync-alt"></i> Làm mới
                </button>
            </div>
        </div>

        <!-- Stats Summary -->
        <div class="stats-summary">
            <div class="stat-summary-item">
                <i class="fas fa-chair"></i>
                <span>Tổng số bàn: <strong id="totalTables">0</strong></span>
            </div>
            <div class="stat-summary-item available">
                <i class="fas fa-circle"></i>
                <span>Trống: <strong id="availableTables">0</strong></span>
            </div>
            <div class="stat-summary-item occupied">
                <i class="fas fa-circle"></i>
                <span>Đang dùng: <strong id="occupiedTables">0</strong></span>
            </div>
            <div class="stat-summary-item reserved">
                <i class="fas fa-circle"></i>
                <span>Đã đặt: <strong id="reservedTables">0</strong></span>
            </div>
        </div>

        <!-- Tables Grid -->
        <div class="tables-container">
            <div class="tables-grid" id="tablesGrid">
                <div class="loading-spinner">
                    <i class="fas fa-spinner fa-spin"></i> Đang tải...
                </div>
            </div>
        </div>
    </main>

    <!-- Table Detail Modal -->
    <div id="tableModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTableTitle">Chi tiết bàn</h3>
                <button class="modal-close" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Nội dung sẽ load bằng JS -->
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" id="modalCancelBtn">Đóng</button>
                <button class="btn-confirm" id="modalConfirmBtn">Cập nhật trạng thái</button>
            </div>
        </div>
    </div>

    <!-- Confirm Change Status Modal -->
    <div id="confirmModal" class="modal hidden">
        <div class="modal-content confirm-modal">
            <div class="modal-icon">
                <i class="fas fa-question-circle"></i>
            </div>
            <h3>Xác nhận đổi trạng thái</h3>
            <p id="confirmMessage">Bạn có chắc chắn muốn đổi trạng thái bàn này?</p>
            <div class="modal-buttons">
                <button class="btn-cancel" id="confirmCancelBtn">Hủy</button>
                <button class="btn-confirm" id="confirmOkBtn">Xác nhận</button>
            </div>
        </div>
    </div>

    <script src="../../../shared/js/staff-navbar.js"></script>
    <script src="../js/tables.js"></script>
</body>
</html>
