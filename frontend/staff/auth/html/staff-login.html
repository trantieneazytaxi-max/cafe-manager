<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhân viên Đăng nhập - Cà Phê Thông Minh</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/staff-login.css">
</head>
<body>
    <div class="staff-auth-container">
        <div class="staff-auth-card">
            <div class="staff-logo">
                <i class="fas fa-mug-hot"></i>
                <span>Cà Phê <span class="highlight">Thông Minh</span></span>
                <span class="staff-badge">STAFF</span>
            </div>
            
            <h2>Đăng nhập Nhân viên</h2>
            <p class="subtitle">Quản lý phục vụ tại quán</p>

            <form id="loginForm" class="staff-auth-form">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Email" required autocomplete="off">
                </div>

                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Mật khẩu" required>
                    <i class="fas fa-eye-slash toggle-password" data-target="password"></i>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe"> Ghi nhớ đăng nhập
                    </label>
                    <a href="#" class="forgot-password" id="forgotPasswordBtn">Quên mật khẩu?</a>
                </div>

                <button type="submit" class="staff-auth-btn">
                    <i class="fas fa-sign-in-alt"></i> Đăng nhập
                </button>
            </form>

            <div class="staff-auth-footer">
                <p><a href="../../../main.html">← Quay lại chọn vai trò</a></p>
            </div>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div id="forgotModal" class="modal hidden">
        <div class="modal-content forgot-modal">
            <div class="modal-header">
                <h3>Quên mật khẩu</h3>
                <button class="modal-close" id="closeForgotModal">&times;</button>
            </div>
            <div class="modal-body">
                <p>Vui lòng nhập email của bạn. Yêu cầu đặt lại mật khẩu sẽ được gửi đến quản trị viên.</p>
                <div class="form-group">
                    <input type="email" id="forgotEmail" placeholder="Email của bạn" required>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" id="cancelForgotBtn">Hủy</button>
                <button class="btn-confirm" id="submitForgotBtn">Gửi yêu cầu</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="../js/staff-login.js"></script>
</body>
</html>
