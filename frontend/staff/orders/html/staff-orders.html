<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Quản lý đơn hàng - Nhân viên | Cà Phê Thông Minh</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/staff-orders.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-mug-hot"></i>
                <span>Cà Phê <span class="highlight">Thông Minh</span></span>
                <span class="staff-badge">STAFF</span>
            </div>
            <div class="nav-links" id="navLinks">
                <a href="../../dashboard/html/staff-dashboard.html">
                    <i class="fas fa-chart-line"></i> Dashboard
                </a>
                <a href="../../tables/html/tables.html">
                    <i class="fas fa-chair"></i> Quản lý bàn
                </a>
                <a href="#" class="active">
                    <i class="fas fa-receipt"></i> Đơn hàng
                </a>
            </div>
            <div class="user-menu">
                <div class="user-info">
                    <img id="staffAvatar" class="avatar" src="https://ui-avatars.com/api/?background=3498db&color=fff&rounded=true" alt="Avatar">
                    <span id="staffName">Nhân viên</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
                <div class="dropdown-menu" id="dropdownMenu">
                    <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a>
                </div>
            </div>
            <div class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="page-header">
            <h1><i class="fas fa-receipt"></i> Quản lý đơn hàng</h1>
            <div class="header-actions">
                <button class="refresh-btn" id="refreshBtn">
                    <i class="fas fa-sync-alt"></i> Làm mới
                </button>
            </div>
        </div>

        <!-- Stats Summary -->
        <div class="stats-summary">
            <div class="stat-item">
                <i class="fas fa-clock"></i>
                <span>Chờ xử lý: <strong id="pendingCount">0</strong></span>
            </div>
            <div class="stat-item">
                <i class="fas fa-check-circle"></i>
                <span>Đã hoàn thành: <strong id="completedCount">0</strong></span>
            </div>
            <div class="stat-item">
                <i class="fas fa-chart-simple"></i>
                <span>Doanh thu hôm nay: <strong id="todayRevenue">0₫</strong></span>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" data-status="all">Tất cả</button>
            <button class="tab-btn" data-status="pending">Chờ xử lý</button>
            <button class="tab-btn" data-status="paid">Đã thanh toán</button>
            <button class="tab-btn" data-status="cancelled">Đã hủy</button>
        </div>

        <!-- Search -->
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Tìm kiếm theo mã đơn, bàn, khách hàng...">
        </div>

        <!-- Orders Table -->
        <div class="table-container">
            <table class="orders-table">
                <thead>
                    <tr>
                        <th>Mã đơn</th>
                        <th>Bàn</th>
                        <th>Khách hàng</th>
                        <th>Tổng tiền</th>
                        <th>Thời gian</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="ordersTableBody">
                    <tr>
                        <td colspan="7" class="loading">Đang tải...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Order Detail Modal -->
    <div id="orderModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Chi tiết đơn hàng #<span id="orderIdSpan"></span></h3>
                <button class="modal-close" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body" id="orderDetailBody">
                <!-- Nội dung sẽ load bằng JS -->
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" id="modalCancelBtn">Đóng</button>
                <button class="btn-confirm" id="confirmOrderBtn">Xác nhận hoàn thành</button>
            </div>
        </div>
    </div>

    <script src="../js/staff-orders.js"></script>
</body>
</html>
